<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙 Para ti</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff9ac1,#9ad0ff,#ffd6f3,#bde7ff);
    background-size:400% 400%;
    animation: bg 10s ease infinite;
    text-align:center;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:25px;
    width:90%;
    max-width:520px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    animation:fade 1s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    color:#ff3f88;
    margin-bottom:10px;
}

#countdown{
    font-size:32px;
    font-weight:bold;
    margin:25px 0;
    color:#222;
}

.sub{
    opacity:0.7;
    margin-bottom:20px;
}

button{
    background:linear-gradient(45deg,#ff3f88,#ff79b0);
    border:none;
    padding:15px 25px;
    border-radius:50px;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(255,63,136,0.3);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 15px 25px rgba(255,63,136,0.4);
}

.ticket{
    display:none;
    margin-top:25px;
    padding:20px;
    border-radius:20px;
    border:2px dashed #ff3f88;
    background:#fff5fa;
    animation:fade 0.6s ease;
}

.final{
    display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="main">
    <h1>💙 ¡Qué poquito queda para tu gran día!</h1>
    <div class="sub">Cuenta atrás hacia algo especial ✨</div>

    <div id="countdown"></div>

    <button onclick="showGift()">🎁 Descubrir regalo</button>

    <div class="ticket" id="gift">
        <h2>🎟️ Tu primer regalo</h2>
        <h2>🍣 Cena de sushi juntos</h2>
        <p>Porque contigo cualquier plan sabe mejor 💖</p>
    </div>
</div>

<div class="final" id="final">
    <h1>🎉 ¡FELIZ CUMPLEAÑOS! 🎉</h1>
    <p>Hoy es un día muy especial 💖</p>
    <p>Ojalá disfrutes cada segundo como te mereces</p>
    <h2>❤️ Te quiero muchísimo ❤️</h2>
</div>

</div>

<script>

const target = new Date("July 16, 2026 00:00:00").getTime();

const x = setInterval(() => {

const now = new Date().getTime();
const diff = target - now;

if(diff < 0){
    clearInterval(x);
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="block";
    return;
}

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
`${d}d : ${h}h : ${m}m : ${s}s`;

},1000);

function showGift(){
    document.getElementById("gift").style.display="block";
}

</script>

</body>
</html>
