<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙 Sorpresa</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#ffd1e8,#cfe9ff,#ffffff);
    text-align:center;
}

/* CARD PRINCIPAL */
.card{
    background:rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    padding:40px;
    border-radius:28px;
    width:92%;
    max-width:520px;
    box-shadow:0 25px 60px rgba(0,0,0,0.2);
    animation:pop 0.8s ease;
}

@keyframes pop{
    from{opacity:0; transform:scale(0.95);}
    to{opacity:1; transform:scale(1);}
}

h1{
    color:#black;
    margin-bottom:10px;
}

#countdown{
    font-size:34px;
    font-weight:bold;
    margin:20px 0;
    color:#black;
}

/* BOTÓN PRO */
button{
    background:linear-gradient(45deg,#7CFC9A,#ff78b2);
    border:none;
    padding:14px 26px;
    border-radius:999px;
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(255,63,136,0.35);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 15px 35px rgba(255,63,136,0.5);
}

/* TICKET PRO */
.ticket{
    display:none;
    margin-top:25px;
    animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.ticket-box{
    display:flex;
    background:linear-gradient(135deg,#ffffff,#ffeaf3);
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* efecto papel */
.ticket-box::before{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    left:70%;
    width:0;
    border-left:3px dashed rgba(255,63,136,0.4);
}

/* perforaciones */
.ticket-box::after{
    content:"";
    position:absolute;
    left:70%;
    top:-10px;
    width:20px;
    height:20px;
    background:white;
    border-radius:50%;
    box-shadow:0 90px 0 white;
}

/* lado izquierdo */
.left{
    flex:1;
    padding:20px;
    text-align:left;
}

.small{
    font-size:12px;
    opacity:0.5;
    letter-spacing:2px;
}

.big{
    font-size:22px;
    font-weight:bold;
    color:#ff3f88;
    margin:10px 0;
}

.desc{
    font-size:14px;
    opacity:0.8;
    line-height:1.4;
}

/* lado derecho */
.right{
    width:90px;
    background:linear-gradient(135deg,#ff3f88,#ff78b2);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.date{
    font-size:14px;
    font-weight:bold;
    transform:rotate(-90deg);
    white-space:nowrap;
}

/* FINAL */
.final{
    display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="main">
    <h1>💙 ¡Qué poquito queda para tu gran día mi bordee🎂🫶🏼!</h1>
    <div id="countdown"></div>

    <button onclick="showGift()">🎁 Descubrir regalo</button>

    <div class="ticket" id="gift">
        <div class="ticket-box">

            <div class="left">
                <div class="small">PRIMER REGALITO🤭</div>
                <div class="big">🍣 Sushi juntos</div>
                <div class="desc">
                
                    Porque no hay mejor amiga para compartir sushi y momentos juntos ❤️
                </div>
            </div>

            <div class="right">
                <div class="date">16 JUL</div>
            </div>

        </div>
    </div>

</div>

<div class="final" id="final">
    <h1>🎉 ¡FELIZ CUMPLEAÑOS! 🎉</h1>
    <p>Hoy es tu día 💖</p>
    <p>Eres alguien muy importante para mí</p>
    <h2>❤️ Disfrútalo muchísimo ❤️</h2>
</div>

</div>

<script>

const target = new Date("July 16, 2026 00:00:00").getTime();

const timer = setInterval(()=>{

const now = new Date().getTime();
const diff = target - now;

if(diff < 0){
    clearInterval(timer);
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="block";
    return;
}

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;

},1000);

function showGift(){
    document.getElementById("gift").style.display="block";
}

</script>

</body>
</html>
