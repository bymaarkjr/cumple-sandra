<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙 Sorpresa</title>

<style>
body{
    margin:0;
    font-family:'Arial', sans-serif;
    background: linear-gradient(135deg,#ffb6d5,#ffe3f1,#d6f0ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

.card{
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    max-width:500px;
    width:90%;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    color:#ff4f8b;
    margin-bottom:10px;
}

#countdown{
    font-size:32px;
    font-weight:bold;
    margin:25px 0;
    color:#333;
}

button{
    background:linear-gradient(45deg,#ff4f8b,#ff77a9);
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.05);
}

.ticket{
    display:none;
    margin-top:25px;
    padding:20px;
    border:2px dashed #ff4f8b;
    border-radius:20px;
    background:#fff5fa;
}

.final{
    display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="main">
    <h1>💙 ¡Qué poquito queda para tu gran día!</h1>

    <div id="countdown"></div>

    <button onclick="showGift()">🎁 ¿Quieres descubrir una parte de tu regalo?</button>

    <div class="ticket" id="gift">
        <h2>🎟️ Vale especial</h2>
        <p><strong>Tu primer regalo es:</strong></p>
        <h2>🍣 Una cenita de sushi juntos</h2>
        <p>Porque contigo todo sabe mejor ❤️</p>
    </div>
</div>

<div class="final" id="final">
    <h1>🎉 ¡FELIZ CUMPLEAÑOS! 🎉</h1>
    <p>Hoy es tu día especial 💖</p>
    <p>Gracias por ser tan importante en mi vida.</p>
    <h2>❤️ Disfruta cada segundo ❤️</h2>
</div>

</div>

<script>

const target = new Date("July 16, 2026 00:00:00").getTime();

const x = setInterval(function(){

const now = new Date().getTime();
const distance = target - now;

if(distance < 0){
    clearInterval(x);
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="block";
    return;
}

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
const seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("countdown").innerHTML =
`${days}d ${hours}h ${minutes}m ${seconds}s`;

},1000);

function showGift(){
    document.getElementById("gift").style.display="block";
}

</script>

</body>
</html>
